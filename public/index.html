<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Lily Agent</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --brand: #111827;
        --brand-soft: #eef2ff;
        --danger: #b91c1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(760px, 100%);
        margin: 0 auto;
        padding: 20px 16px 36px;
      }

      header {
        padding: 18px 2px 14px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 30px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.5;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }

      label {
        display: block;
        margin-bottom: 10px;
        font-size: 15px;
        font-weight: 700;
      }

      textarea {
        width: 100%;
        min-height: 170px;
        resize: vertical;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 14px;
        color: var(--text);
        font: inherit;
        font-size: 17px;
        line-height: 1.45;
      }

      textarea:focus {
        border-color: var(--brand);
        outline: 3px solid rgba(17, 24, 39, 0.12);
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }

      button {
        min-height: 52px;
        border: 0;
        border-radius: 8px;
        padding: 0 18px;
        font: inherit;
        font-size: 17px;
        font-weight: 800;
        cursor: pointer;
      }

      .submit {
        flex: 1;
        background: var(--brand);
        color: #ffffff;
      }

      .clear {
        background: #e5e7eb;
        color: var(--text);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      .examples {
        display: grid;
        gap: 8px;
        margin: 14px 0 0;
      }

      .example {
        width: 100%;
        min-height: 46px;
        background: var(--brand-soft);
        color: #1f2937;
        font-size: 14px;
        font-weight: 700;
        text-align: left;
      }

      .result {
        margin-top: 16px;
      }

      .status {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 15px;
      }

      .error {
        color: var(--danger);
        font-weight: 700;
      }

      .summary {
        margin: 0 0 14px;
        font-size: 16px;
        line-height: 1.5;
      }

      .lead-list {
        display: grid;
        gap: 12px;
      }

      .lead {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        background: #ffffff;
      }

      .lead h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .lead a {
        color: #2563eb;
        word-break: break-word;
      }

      .lead p {
        margin: 10px 0 0;
        line-height: 1.5;
      }

      .email {
        white-space: pre-wrap;
        background: #f9fafb;
        border-radius: 8px;
        padding: 12px;
      }

      pre {
        overflow-x: auto;
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        background: #0f172a;
        color: #e5e7eb;
        border-radius: 8px;
        padding: 14px;
        font-size: 13px;
        line-height: 1.45;
      }

      @media (max-width: 520px) {
        main {
          padding: 16px 12px 28px;
        }

        h1 {
          font-size: 28px;
        }

        .panel {
          padding: 14px;
        }

        .actions {
          flex-direction: column;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Lily Agent</h1>
        <p class="subtitle">
          Type a business task, submit it, and Lily will return a structured result.
        </p>
      </header>

      <section class="panel">
        <form id="taskForm">
          <label for="task">Task</label>
          <textarea
            id="task"
            name="task"
            placeholder="Find 10 California auto dealers who may import jump starters from China"
            autocomplete="off"
          ></textarea>

          <div class="actions">
            <button class="submit" id="submitButton" type="submit">
              Submit
            </button>
            <button class="clear" id="clearButton" type="button">
              Clear
            </button>
          </div>
        </form>

        <div class="examples">
          <button class="example" type="button">
            Find 10 California auto dealers who may import jump starters from China
          </button>
          <button class="example" type="button">
            Write a short outreach email for a jump starter importer
          </button>
        </div>
      </section>

      <section class="panel result" aria-live="polite">
        <p class="status" id="status">Result will appear here.</p>
        <div id="result"></div>
      </section>
    </main>

    <script>
      const form = document.querySelector("#taskForm");
      const taskInput = document.querySelector("#task");
      const submitButton = document.querySelector("#submitButton");
      const clearButton = document.querySelector("#clearButton");
      const statusEl = document.querySelector("#status");
      const resultEl = document.querySelector("#result");
      const examples = document.querySelectorAll(".example");

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderResult(data) {
        const result = data.result || data;
        const leads = Array.isArray(result.leads) ? result.leads : [];

        if (leads.length === 0) {
          resultEl.innerHTML = `<pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
          return;
        }

        const summary = result.summary
          ? `<p class="summary">${escapeHtml(result.summary)}</p>`
          : "";

        const cards = leads
          .map((lead) => {
            const website = lead.website
              ? `<p><strong>Website:</strong> <a href="${escapeHtml(lead.website)}" target="_blank" rel="noreferrer">${escapeHtml(lead.website)}</a></p>`
              : "";

            return `
              <article class="lead">
                <h2>${escapeHtml(lead.company_name || "Lead")}</h2>
                ${website}
                <p><strong>Reason:</strong> ${escapeHtml(lead.reason_good_lead || "")}</p>
                <p><strong>Outreach email:</strong></p>
                <p class="email">${escapeHtml(lead.suggested_outreach_email || "")}</p>
              </article>
            `;
          })
          .join("");

        resultEl.innerHTML = `${summary}<div class="lead-list">${cards}</div>`;
      }

      async function submitTask(task) {
        statusEl.textContent = "Lily is working...";
        statusEl.classList.remove("error");
        resultEl.innerHTML = "";
        submitButton.disabled = true;

        try {
          const response = await fetch("/api/lily", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ task })
          });

          const data = await response.json();

          if (!response.ok || data.ok === false) {
            throw new Error(data.error || "Request failed");
          }

          statusEl.textContent = "Done.";
          renderResult(data);
        } catch (error) {
          statusEl.textContent = error.message || "Something went wrong.";
          statusEl.classList.add("error");
        } finally {
          submitButton.disabled = false;
        }
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const task = taskInput.value.trim();

        if (!task) {
          statusEl.textContent = "Please enter a task first.";
          statusEl.classList.add("error");
          taskInput.focus();
          return;
        }

        submitTask(task);
      });

      clearButton.addEventListener("click", () => {
        taskInput.value = "";
        statusEl.textContent = "Result will appear here.";
        statusEl.classList.remove("error");
        resultEl.innerHTML = "";
        taskInput.focus();
      });

      examples.forEach((button) => {
        button.addEventListener("click", () => {
          taskInput.value = button.textContent.trim();
          taskInput.focus();
        });
      });
    </script>
  </body>
</html>
